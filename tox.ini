[tox]
min_version = 4.0
envlist = lint, unit, regtests, examples, docs

[testenv]
package = wheel
passenv = *
lint_paths = ipi bin drivers examples ipi_tests setup.py

[testenv:format]
description = auto-format the codebase with black
skip_install = true
deps =
    black==24.8.0
commands =
    black {[testenv]lint_paths}

[testenv:lint]
description = check formatting (black) and undefined-name issues (flake8)
skip_install = true
deps =
    black==24.8.0
    flake8>=3.8.4
commands =
    black --check {[testenv]lint_paths}
    flake8 --select=F --ignore=F403,F405 --per-file-ignores=**__init__.py:F401 {[testenv]lint_paths}

[testenv:unit]
description = run unit tests
extras = test
pytest_flags = --tb=line --capture=no -ra -v
commands =
    pytest {[testenv:unit]pytest_flags} {toxinidir}/ipi_tests/unit_tests

[testenv:regtests]
description = run regression tests (compiles and uses the fortran driver)
extras = test
allowlist_externals = make
setenv =
    PATH = {toxinidir}/drivers/f90:{env:PATH}
commands_pre =
    make -C drivers/f90
commands =
    pytest {[testenv:unit]pytest_flags} {toxinidir}/ipi_tests/regression_tests

[testenv:examples]
description = smoke-test all input examples (compiles and uses the fortran driver)
extras = test
allowlist_externals = make
setenv =
    PATH = {toxinidir}/drivers/f90:{env:PATH}
commands_pre =
    make -C drivers/f90
commands =
    pytest {[testenv:unit]pytest_flags} {toxinidir}/ipi_tests/examples

[testenv:docs]
description = build the Sphinx HTML docs
extras = docs
allowlist_externals = make
changedir = docs
commands =
    make html

[testenv:docs-pdf]
description = build the Sphinx PDF docs (requires a working LaTeX toolchain: texlive + latexmk)
extras = docs
allowlist_externals = make
changedir = docs
commands =
    make latexpdf
