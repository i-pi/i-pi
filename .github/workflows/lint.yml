name: Lint

on: [push, pull_request]

jobs:

  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install tox
        run: python -m pip install --upgrade pip 'tox>=4'
      - name: Run lint
        run: tox -e lint
