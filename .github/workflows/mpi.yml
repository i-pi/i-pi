name: MPI transport tests

on:
  push:
    branches: [main]
  pull_request:
    # Check all PR

concurrency:
  group: mpi-tests-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  mpi-tests:
    runs-on: ${{ matrix.os }}
    name: MPI transport on ${{ matrix.os }} / Python ${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            python-version: "3.13"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: install MPI toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran libopenmpi-dev openmpi-bin

      - name: install tox
        run: python -m pip install --upgrade pip 'tox>=4'

      - name: ffmpi example tests
        run: tox -e mpitests
