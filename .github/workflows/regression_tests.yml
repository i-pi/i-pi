name: Regression tests

on:
  push:
    branches: [main]
  pull_request:
    # Check all PR

concurrency:
  group: regression-tests-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  regression-tests:
    runs-on: ${{ matrix.os }}
    name: Regression tests on ${{ matrix.os }} / Python ${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            python-version: "3.10"
          - os: ubuntu-24.04
            python-version: "3.13"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: install gfortran
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran

      - name: install tox
        run: python -m pip install --upgrade pip 'tox>=4'

      - name: regression tests
        run: tox -e regtests -- --cov=ipi --cov-report=xml:coverage-regtests.xml --cov-report=term ipi_tests/regression_tests

      - name: upload coverage
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage-regtests.xml
          fail_ci_if_error: true
