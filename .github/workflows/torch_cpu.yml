name: Torch CPU backend tests

on:
  push:
    branches: [main]
  pull_request:
    # Check all PR

concurrency:
  group: torch-cpu-tests-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  torch-cpu-tests:
    runs-on: ubuntu-24.04
    name: Unit + examples on torch CPU backend / Python 3.13

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: install gfortran
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran

      - name: install tox
        run: python -m pip install --upgrade pip 'tox>=4'

      - name: unit + examples (torch CPU)
        run: tox -e test-torch-cpu
