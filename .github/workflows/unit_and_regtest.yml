name: Regression and unitary tests

on:
  push:
    branches: [main]
  pull_request:
    # Check all PR

concurrency:
  group: reg-unit-tests-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  reg-unit-tests:
    runs-on: ${{ matrix.os }}
    name: Regtests on ${{ matrix.os }} / Python ${{ matrix.python-version }}
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            python-version: "3.8"
          - os: ubuntu-24.04
            python-version: "3.12"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: install gfortran
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran

      - name: install tox
        run: python -m pip install --upgrade pip 'tox>=4'

      - name: unit tests
        run: tox -e unit

      - name: regression tests
        run: tox -e regtests
